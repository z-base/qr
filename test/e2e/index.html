<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR E2E</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f5f7ff, #f0f4f8);
        font-family: 'Segoe UI', sans-serif;
      }
      main {
        width: min(95vw, 760px);
        background: #fff;
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        display: grid;
        gap: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      input {
        flex: 1;
        min-width: 220px;
        padding: 10px 12px;
      }
      button {
        padding: 10px 12px;
      }
      output {
        min-height: 1.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QR E2E Harness</h1>
      <div class="row">
        <input id="qr-value-input" type="text" value="playwright-value" />
      </div>
      <div class="row">
        <button id="display-qr">Display</button>
        <button id="print-qr">Print</button>
        <button id="scan-qr">Scan</button>
      </div>
      <output id="qr-scan-output"></output>
    </main>

    <script type="module" src="/in-browser-testing.js" defer></script>
  </body>
</html>
